<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Админ-панель PIXEL RPG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Courier New', monospace;
  background: #0a0a1a;
  color: #ccc;
  height: 100vh;
  overflow: hidden;
}

/* ── ЛОГИН ── */
#loginScreen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #0a0a2a, #050510);
  z-index: 1000;
}
.login-box {
  width: 300px;
  padding: 32px 24px;
  background: rgba(10,10,30,0.95);
  border: 1px solid #2a2a5a;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 0 40px rgba(100,50,200,0.15);
}
.login-logo { font-size: 14px; color: #f5c542; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; }
.login-title { font-size: 20px; color: #aaa; margin-bottom: 20px; }
.login-error { color: #e74c3c; font-size: 12px; min-height: 20px; margin-bottom: 8px; }
.login-input {
  width: 100%; padding: 12px; margin-bottom: 10px;
  background: #0d0d22; border: 1px solid #2a2a5a; border-radius: 8px;
  color: #fff; font-size: 14px; font-family: 'Courier New', monospace;
}
.login-input:focus { outline: none; border-color: #f5c542; }
.login-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(90deg, #4a2a8a, #7a4ad0);
  border: none; border-radius: 8px;
  color: #fff; font-size: 16px; font-weight: bold;
  cursor: pointer; font-family: 'Courier New', monospace;
}
.login-btn:active { transform: scale(0.97); opacity: 0.8; }
.login-version { font-size: 10px; color: #445; margin-top: 16px; }

/* ── ХЕДЕР ── */
.admin-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(5,5,20,0.98);
  border-bottom: 1px solid #2a2a5a;
}
.admin-title { font-size: 14px; color: #f5c542; font-weight: bold; letter-spacing: 1px; }
.admin-user { font-size: 11px; color: #778; }
.admin-logout {
  background: none; border: none; color: #e74c3c;
  font-size: 18px; cursor: pointer; padding: 4px 8px;
}

/* ── ВКЛАДКИ ── */
.admin-tabs {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
  display: flex;
  background: rgba(5,5,20,0.95);
  border-bottom: 1px solid #1a1a35;
}
.tab-btn {
  flex: 1; padding: 12px 0;
  background: none; border: none;
  color: #556; font-size: 20px;
  cursor: pointer; transition: color .2s;
  border-bottom: 2px solid transparent;
}
.tab-btn.active { color: #f5c542; border-bottom-color: #f5c542; }
.tab-btn:active { transform: scale(0.9); }

/* ── КОНТЕНТ ── */
.admin-content {
  position: fixed; top: 96px; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  padding: 12px 12px 80px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── СТАТИСТИКА ── */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.stat-card {
  padding: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid #1a1a35;
  border-radius: 10px;
}
.stat-card.full { grid-column: 1 / -1; }
.stat-num { font-size: 28px; font-weight: bold; color: #f5c542; }
.stat-label { font-size: 10px; color: #778; margin-top: 2px; }

/* ── ПОИСК ── */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.search-input {
  flex: 1; padding: 10px 12px;
  background: #0d0d22; border: 1px solid #2a2a5a; border-radius: 8px;
  color: #fff; font-size: 13px; font-family: 'Courier New', monospace;
}
.search-input:focus { outline: none; border-color: #f5c542; }
.search-btn {
  padding: 10px 16px;
  background: #2a2a5a; border: none; border-radius: 8px;
  color: #fff; font-size: 16px; cursor: pointer;
}

/* ── ПОЛЬЗОВАТЕЛИ ── */
.users-list { margin-bottom: 12px; }
.user-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid #1a1a35;
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background .15s;
}
.user-row:active { background: rgba(255,255,255,0.07); }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; color: #ddd; }
.user-id { font-size: 9px; color: #556; }
.user-stats { display: flex; gap: 10px; font-size: 11px; color: #778; }
.user-stats span { color: #f5c542; }

.pagination {
  display: flex; gap: 6px; justify-content: center;
}
.pagination button {
  padding: 6px 12px;
  background: #1a1a35; border: none; border-radius: 6px;
  color: #778; font-size: 12px; cursor: pointer;
  font-family: 'Courier New', monospace;
}
.pagination button.active { background: #3a3a7a; color: #f5c542; }

/* ── РАССЫЛКА ── */
.broadcast-input {
  width: 100%; height: 120px;
  padding: 12px;
  background: #0d0d22; border: 1px solid #2a2a5a; border-radius: 8px;
  color: #fff; font-size: 13px; font-family: 'Courier New', monospace;
  resize: vertical;
}
.broadcast-input:focus { outline: none; border-color: #f5c542; }
.broadcast-target {
  width: 100%; padding: 10px; margin: 10px 0;
  background: #0d0d22; border: 1px solid #2a2a5a; border-radius: 8px;
  color: #fff; font-size: 13px; font-family: 'Courier New', monospace;
}
.broadcast-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(90deg, #2a5a2a, #4a8a4a);
  border: none; border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: bold;
  cursor: pointer; font-family: 'Courier New', monospace;
}
.broadcast-btn:active { opacity: 0.8; }

/* ── ЛОГИ ── */
.log-row {
  padding: 8px 10px;
  border-bottom: 1px solid #0a0a1a;
  font-size: 11px;
}
.log-time { color: #556; }
.log-admin { color: #f5c542; font-weight: bold; }
.log-action { color: #4cf; }
.log-target { color: #a78bfa; }

/* ── МОДАЛКА ── */
.modal {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.8);
}
.modal.show { display: flex; }
.modal-content {
  width: 92%; max-width: 400px; max-height: 85vh;
  background: #0e0e22; border: 1px solid #2a2a5a; border-radius: 16px;
  overflow: hidden;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #1a1a35;
}
.modal-title { font-size: 15px; font-weight: bold; color: #f5c542; }
.modal-close {
  background: none; border: none; color: #666;
  font-size: 20px; cursor: pointer; padding: 0 4px;
}
.modal-body {
  padding: 16px;
  overflow-y: auto; max-height: 70vh;
}
.modal-body .field {
  display: flex; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid #0a0a1a;
  font-size: 12px;
}
.modal-body .field-label { color: #778; }
.modal-body .field-value { color: #ddd; }
.modal-body .field-value.gold { color: #f5c542; }
.modal-body .field-value.pixr { color: #ff44cc; }
.modal-body .field-value.gram { color: #40d0ff; }

.edit-input {
  width: 80px; padding: 4px 8px;
  background: #0d0d22; border: 1px solid #2a2a5a; border-radius: 4px;
  color: #fff; font-size: 13px; font-family: 'Courier New', monospace;
}
.edit-btn {
  padding: 4px 12px;
  background: #2a2a5a; border: none; border-radius: 4px;
  color: #f5c542; font-size: 11px; cursor: pointer;
  font-family: 'Courier New', monospace;
}
.edit-btn:active { opacity: 0.7; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a5a; border-radius: 2px; }

/* ── АДАПТИВ ── */
@media (min-width: 600px) {
  .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .admin-content { padding: 16px 24px 80px; }
  .modal-content { max-width: 500px; }
}
</style>
</head>
<body>

<!-- ════════════════════════════════
     ЭКРАН ВХОДА
     ════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">⚙️ PIXEL RPG</div>
    <div class="login-title">Админ-панель</div>
    <div class="login-error" id="loginError"></div>
    <input class="login-input" id="loginInput" type="text" placeholder="Логин" autocomplete="username">
    <input class="login-input" id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">Войти</button>
    <div class="login-version">v2.0</div>
  </div>
</div>

<!-- ════════════════════════════════
     АДМИН-ПАНЕЛЬ
     ════════════════════════════════ -->
<div id="adminPanel" style="display:none;">

  <!-- Хедер -->
  <div class="admin-header">
    <div class="admin-title">⚙️ PIXEL RPG</div>
    <div class="admin-user" id="adminUser">admin</div>
    <button class="admin-logout" onclick="logout()">🚪</button>
  </div>

  <!-- Вкладки -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊</button>
    <button class="tab-btn" data-tab="users" onclick="switchTab('users')">👥</button>
    <button class="tab-btn" data-tab="economy" onclick="switchTab('economy')">💰</button>
    <button class="tab-btn" data-tab="broadcast" onclick="switchTab('broadcast')">📨</button>
    <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">📋</button>
  </div>

  <!-- Контент -->
  <div class="admin-content">

    <!-- 📊 ДАШБОРД -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-num" id="statUsers">0</div><div class="stat-label">Игроков</div></div>
        <div class="stat-card"><div class="stat-num" id="statActive">0</div><div class="stat-label">За 24ч</div></div>
        <div class="stat-card"><div class="stat-num" id="statOnline">0</div><div class="stat-label">Онлайн</div></div>
        <div class="stat-card"><div class="stat-num" id="statWithChar">0</div><div class="stat-label">С персонажем</div></div>
      </div>
      <div class="stat-card full">
        <div class="stat-label">Топ игроков по CP</div>
        <div id="topCP"></div>
      </div>
      <div class="stat-card full">
        <div class="stat-label">Этажи</div>
        <div id="floorsStats"></div>
      </div>
    </div>

    <!-- 👥 ПОЛЬЗОВАТЕЛИ -->
    <div class="tab-content" id="tab-users">
      <div class="search-bar">
        <input class="search-input" id="userSearch" placeholder="Поиск по ID или имени..." oninput="loadUsers(1)">
        <button class="search-btn" onclick="loadUsers(1)">🔍</button>
      </div>
      <div class="users-list" id="usersList"></div>
      <div class="pagination" id="usersPagination"></div>
    </div>

    <!-- 💰 ЭКОНОМИКА -->
    <div class="tab-content" id="tab-economy">
      <div class="stat-card full">
        <div class="stat-label">Топ по золоту</div>
        <div id="topGold"></div>
      </div>
      <div class="stat-card full">
        <div class="stat-label">Топ по PIXR</div>
        <div id="topPixr"></div>
      </div>
      <div class="stat-card full">
        <div class="stat-label">Топ по GRAM</div>
        <div id="topGram"></div>
      </div>
    </div>

    <!-- 📨 РАССЫЛКА -->
    <div class="tab-content" id="tab-broadcast">
      <div class="stat-card full">
        <div class="stat-label">Рассылка сообщения</div>
        <textarea class="broadcast-input" id="broadcastMessage" placeholder="Введите сообщение для всех игроков..."></textarea>
        <select class="broadcast-target" id="broadcastTarget">
          <option value="all">Всем игрокам</option>
          <option value="active">Активным (24ч)</option>
          <option value="premium">Премиум</option>
        </select>
        <button class="broadcast-btn" onclick="sendBroadcast()">📨 Отправить</button>
        <div id="broadcastResult"></div>
      </div>
    </div>

    <!-- 📋 ЛОГИ -->
    <div class="tab-content" id="tab-logs">
      <div class="stat-card full">
        <div class="stat-label">Последние действия</div>
        <div id="logsList"></div>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════════
       МОДАЛКА ПОЛЬЗОВАТЕЛЯ
       ════════════════════════════════ -->
  <div class="modal" id="userModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Пользователь</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  var API = window.location.origin;
  var SESSION = null;
  var currentPage = 1;
  var currentUserTgId = null;

  // ═══════════════════════════════
  //  АВТОРИЗАЦИЯ
  // ═══════════════════════════════

  function login() {
    var loginEl = document.getElementById('loginInput');
    var passwordEl = document.getElementById('passwordInput');
    var errorEl = document.getElementById('loginError');
    
    var login = loginEl.value.trim();
    var password = passwordEl.value.trim();
    
    if (!login || !password) {
      errorEl.textContent = 'Введите логин и пароль';
      return;
    }
    
    errorEl.textContent = 'Загрузка...';
    
    fetch(API + '/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password })
    })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (!r.ok) {
        errorEl.textContent = 'Неверный логин или пароль';
        return;
      }
      
      SESSION = r.session;
      localStorage.setItem('adminSession', SESSION);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('adminUser').textContent = r.login;
      
      loadDashboard();
    })
    .catch(function() {
      errorEl.textContent = 'Ошибка соединения';
    });
  }

  function logout() {
    if (!SESSION) return;
    fetch(API + '/admin/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: SESSION })
    });
    SESSION = null;
    localStorage.removeItem('adminSession');
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  window.logout = logout;

  // ── Проверка сессии при загрузке ──
  function checkSession() {
    var saved = localStorage.getItem('adminSession');
    if (saved) {
      SESSION = saved;
      fetch(API + '/admin/check?session=' + SESSION)
        .then(function(r) { return r.json(); })
        .then(function(r) {
          if (r.ok) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminUser').textContent = r.login;
            loadDashboard();
          } else {
            localStorage.removeItem('adminSession');
            SESSION = null;
          }
        });
    }
  }

  // ── Вход по Enter ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
      login();
    }
  });

  document.getElementById('loginBtn').addEventListener('click', login);

  // ═══════════════════════════════
  //  ВКЛАДКИ
  // ═══════════════════════════════

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    document.querySelectorAll('.tab-content').forEach(function(c) {
      c.classList.toggle('active', c.id === 'tab-' + tab);
    });
    
    if (tab === 'dashboard') loadDashboard();
    if (tab === 'users') loadUsers(1);
    if (tab === 'economy') loadEconomy();
    if (tab === 'logs') loadLogs();
  }

  window.switchTab = switchTab;

  // ═══════════════════════════════
  //  ДАШБОРД
  // ═══════════════════════════════

  function loadDashboard() {
    if (!SESSION) return;
    
    fetch(API + '/admin/api/stats?session=' + SESSION)
      .then(function(r) { return r.json(); })
      .then(function(r) {
        if (!r.ok) return;
        
        var s = r.stats;
        document.getElementById('statUsers').textContent = s.totalUsers || 0;
        document.getElementById('statActive').textContent = s.active24h || 0;
        document.getElementById('statOnline').textContent = s.online || 0;
        document.getElementById('statWithChar').textContent = s.usersWithChar || 0;
        
        // Топ CP
        var topHtml = '';
        if (s.topCP && s.topCP.length) {
          s.topCP.forEach(function(u, i) {
            topHtml += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0a0a1a;font-size:12px;">' +
              '<span>' + (i+1) + '. ' + (u.firstName || u.username || 'Игрок') + '</span>' +
              '<span style="color:#f5c542;">' + u.cp + ' CP</span>' +
              '</div>';
          });
        } else {
          topHtml = '<div style="color:#445;padding:10px 0;">Нет данных</div>';
        }
        document.getElementById('topCP').innerHTML = topHtml;
        
        // Этажи
        var floorsHtml = '';
        if (s.floors && s.floors.length) {
          s.floors.forEach(function(f) {
            var pct = ((f.count / s.totalUsers) * 100).toFixed(1);
            floorsHtml += '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid #0a0a1a;">' +
              '<span>Этаж ' + f._id + '</span>' +
              '<span style="color:#7ab8ff;">' + f.count + ' (' + pct + '%)</span>' +
              '</div>';
          });
        } else {
          floorsHtml = '<div style="color:#445;padding:10px 0;">Нет данных</div>';
        }
        document.getElementById('floorsStats').innerHTML = floorsHtml;
      });
  }

  // ═══════════════════════════════
  //  ПОЛЬЗОВАТЕЛИ
  // ═══════════════════════════════

  function loadUsers(page) {
    if (!SESSION) return;
    currentPage = page || 1;
    
    var search = document.getElementById('userSearch').value.trim();
    var url = API + '/admin/api/users?session=' + SESSION + '&page=' + currentPage + '&limit=20';
    if (search) url += '&search=' + encodeURIComponent(search);
    
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(r) {
        if (!r.ok) return;
        
        var list = document.getElementById('usersList');
        var html = '';
        
        r.users.forEach(function(u) {
          var data = u.data || {};
          var char = u.charId ? (u.charId === 'fire' ? '🔥' : u.charId === 'light' ? '✨' : '💧') : '❌';
          html += '<div class="user-row" onclick="openUser(\'' + u.tgId + '\')">' +
            '<div class="user-info">' +
            '<div class="user-name">' + (u.firstName || u.username || 'Игрок') + ' ' + char + '</div>' +
            '<div class="user-id">ID: ' + u.tgId + '</div>' +
            '</div>' +
            '<div class="user-stats">' +
            '<span>Lv.' + u.level + '</span>' +
            '<span>' + u.cp + ' CP</span>' +
            '<span>💰' + (data.gold || 0) + '</span>' +
            '</div>' +
            '</div>';
        });
        
        if (!r.users.length) {
          html = '<div style="text-align:center;color:#445;padding:30px 0;">Пользователей не найдено</div>';
        }
        
        list.innerHTML = html;
        
        // Пагинация
        var pag = document.getElementById('usersPagination');
        var pagHtml = '';
        for (var i = 1; i <= r.pages && i <= 10; i++) {
          pagHtml += '<button class="' + (i === r.page ? 'active' : '') + '" onclick="loadUsers(' + i + ')">' + i + '</button>';
        }
        pag.innerHTML = pagHtml;
      });
  }

  window.loadUsers = loadUsers;

  // ═══════════════════════════════
  //  ПОЛЬЗОВАТЕЛЬ (модалка)
  // ═══════════════════════════════

  function openUser(tgId) {
    if (!SESSION) return;
    currentUserTgId = tgId;
    
    fetch(API + '/admin/api/user/' + tgId + '?session=' + SESSION)
      .then(function(r) { return r.json(); })
      .then(function(r) {
        if (!r.ok) return;
        
        var u = r.user;
        var data = u.data || {};
        
        document.getElementById('modalTitle').textContent = '👤 ' + (u.firstName || u.username || 'Игрок');
        
        var html = '';
        html += '<div class="field"><span class="field-label">ID</span><span class="field-value">' + u.tgId + '</span></div>';
        html += '<div class="field"><span class="field-label">Имя</span><span class="field-value">' + (u.firstName || '—') + '</span></div>';
